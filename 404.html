<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - Royal Auction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(108, 60, 225, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            padding: 20px;
            text-align: center;
        }

        .error-content {
            max-width: 500px;
        }

        .error-content i {
            font-size: 80px;
            color: var(--secondary);
            margin-bottom: 20px;
            display: block;
            animation: pulse-icon 2s ease-in-out infinite;
        }

        .error-content h1 {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--secondary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .error-content h2 {
            color: var(--text-secondary);
            font-size: 24px;
            margin: 16px 0;
        }

        .error-content p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 30px;
        }

        .error-content .btn {
            min-width: 200px;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(-5deg); }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content card glass">
            <i class="fas fa-compass"></i>
            <h1>404</h1>
            <h2>Página não encontrada</h2>
            <p>A página que você está procurando não existe ou foi movida.</p>
            <button onclick="window.location.href='index.html'" class="btn btn-primary">
                <i class="fas fa-home"></i> Voltar para o início
            </button>
        </div>
    </div>

    <script>
        // Redireciona automaticamente para a página inicial após 5 segundos
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 5000);
    </script>
</body>
</html>
