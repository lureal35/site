<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Royal Auction - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(108, 60, 225, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            padding: 20px;
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 40px 35px;
            box-shadow: var(--shadow-glass);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo i {
            font-size: 48px;
            color: var(--secondary);
            margin-bottom: 12px;
            display: block;
            animation: pulse-icon 2s ease-in-out infinite;
        }

        .login-logo h1 {
            font-size: 28px;
            font-weight: 800;
        }

        .login-logo h1 span {
            background: linear-gradient(135deg, var(--secondary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .login-form .input-group {
            margin-bottom: 16px;
        }

        .login-form .input-group .input-icon {
            left: 16px;
        }

        .login-form .input-group .input-modern {
            padding-left: 48px;
        }

        .login-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .login-buttons .btn {
            flex: 1;
        }

        .message {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .message.error {
            display: block;
            background: rgba(255, 23, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 23, 68, 0.3);
        }

        .message.info {
            display: block;
            background: rgba(0, 212, 255, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-logo h1 {
                font-size: 22px;
            }
            
            .login-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-gavel"></i>
                <h1>Royal<span>Auction</span></h1>
                <p>Entre ou crie sua conta para participar</p>
            </div>

            <div class="login-form">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="nomeUsuario" placeholder="Seu nome" class="input-modern" autofocus>
                </div>
                <div class="input-group">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password" id="senhaUsuario" placeholder="Sua senha" class="input-modern" onkeypress="if(event.key === 'Enter') loginUsuario()">
                </div>
                
                <div class="login-buttons">
                    <button onclick="loginUsuario()" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                    <button onclick="cadastrarUsuario()" class="btn btn-success">
                        <i class="fas fa-user-plus"></i> Cadastrar
                    </button>
                </div>
                
                <div id="mensagemUsuario" class="message"></div>
            </div>

            <div class="login-footer">
                <p>🔒 Sistema seguro · Royal Auction 2026</p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
